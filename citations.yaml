# Edit here only. Downstream files are generated by tools/render_citations.py.
# Schema: works[key].type is either "software" or "journal_article".
# Journal-article entries carry `venue`, `doi`, `volume`, `issue`, `pages` fields
# when first real paper lands; these are not populated until then.

